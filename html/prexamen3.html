<h2>Ejercicio 1 (canvas)</h2>
    <canvas id="myCanvas" width="400" height="200" style="border: 1px solid #000000;"></canvas>
    <script>
          var c = document.getElementById("myCanvas");
        var ctx = c.getContext("2d");
        ctx.fillStyle = '#58d5a2';
        ctx.fillRect(0, 0, 400, 200);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'blue';
        ctx.fillRect(100, 100, 200, 50);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'red';
        ctx.fillRect(130, 50, 150, 60);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'yellow';
        ctx.fillRect(140, 60, 60, 40);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'yellow';
        ctx.fillRect(210, 60, 60, 40);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = '#FFB347';
        ctx.arc(100, 115, 10, 0, 2 * Math.PI)
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = '#FFB347';
        ctx.arc(100, 136, 10, 0, 2 * Math.PI)
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'Black';
        ctx.arc(140, 150, 20, 0, 2 * Math.PI)
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = 'Black';
        ctx.arc(260, 150, 20, 0, 2 * Math.PI)
        ctx.fill();
        ctx.stroke();
    </script>
    <h2>Ejercicio 2 (canvas)</h2>
    <canvas id="myCanva2" width="300" height="150" style="border: 1px solid #000000;"></canvas>
    <script>
          var c = document.getElementById("myCanva2");
        var ctx = c.getContext("2d");
        ctx.fillStyle = '#a0c4ff';
        ctx.fillRect(0, 0, 300, 150);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.fillStyle = 'yellow';
        ctx.arc(150, 75, 60, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = "red";
        ctx.lineWisth = 5;
        ctx.moveTo(90, 75);
        ctx.lineTo(210, 75);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = "red";
        ctx.lineWisth = 5;
        ctx.moveTo(150, 15);
        ctx.lineTo(150, 135);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = "black"; 
        ctx.font = "bold 18px Arial";
        ctx.fillText("Mi Logo",120, 82);
        ctx.stroke();
    </script>
